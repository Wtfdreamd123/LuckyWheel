<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wheel of Fortune — барабан + rare 1995</title>
  <style>
    /* === CSS такой же, как в предыдущем ответе (полный стиль) === */
    :root {
      --bg-gradient: radial-gradient(circle at 20% 30%, #1e1e2f 0%, #0a0a14 100%);
      --glass: rgba(20, 25, 40, 0.7);
      --glass-hover: rgba(40, 50, 70, 0.8);
      --border: rgba(255, 255, 255, 0.15);
      --text: #f0f4fa;
      --accent: #7c3aed;
      --accent-2: #ec4899;
      --warning: #fbbf24;
      --danger: #ef4444;
      --success: #10b981;
      --radius: 20px;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
      --popup-bg: rgba(25, 30, 45, 0.95);
      --tooltip-bg: #1e1e30;
    }

    .theme-light {
      --bg-gradient: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 100%);
      --glass: rgba(255, 255, 255, 0.75);
      --glass-hover: rgba(255, 255, 255, 0.95);
      --border: rgba(0, 0, 0, 0.1);
      --text: #1e293b;
      --accent: #3b82f6;
      --accent-2: #8b5cf6;
      --warning: #b45309;
      --danger: #dc2626;
      --success: #059669;
      --shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
      --popup-bg: rgba(255, 255, 255, 0.95);
      --tooltip-bg: #ffffff;
    }

    .theme-neon {
      --bg-gradient: radial-gradient(circle at 30% 30%, #0f0f1a, #000000);
      --glass: rgba(0, 255, 255, 0.15);
      --glass-hover: rgba(0, 255, 255, 0.3);
      --border: #00ffff88;
      --text: #e0ffff;
      --accent: #00ffff;
      --accent-2: #ff00ff;
      --warning: #ffaa00;
      --danger: #ff3366;
      --success: #00ff88;
      --shadow: 0 0 40px #00ffff55;
      --popup-bg: rgba(10, 20, 30, 0.9);
      --tooltip-bg: #0a1a2a;
    }

    .theme-festive {
      --bg-gradient: radial-gradient(circle at 30% 20%, #2d1b4e, #0f0c1b);
      --glass: rgba(255, 215, 0, 0.15);
      --glass-hover: rgba(255, 215, 0, 0.3);
      --border: #ffd700aa;
      --text: #fff5e0;
      --accent: #ffd700;
      --accent-2: #ff6ec7;
      --warning: #ffb347;
      --danger: #ff4d4d;
      --success: #7fffd4;
      --shadow: 0 0 50px #ffd70055;
      --popup-bg: rgba(40, 20, 50, 0.95);
      --tooltip-bg: #3a1e4a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg-gradient);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      height: 100dvh;
      overflow: hidden;
      margin: 0;
      transition: background 0.3s, color 0.2s;
    }

    .app-container {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 1.8rem;
      padding: 1.8rem;
      height: 100%;
    }

    .sidebar {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      touch-action: pan-y;
    }

    .tabs-header {
      display: flex;
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 0.5rem 0 0.5rem;
      gap: 0.25rem;
    }
    .tab-btn {
      background: transparent;
      border: none;
      color: var(--text);
      padding: 0.8rem 1rem;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      border-radius: 12px 12px 0 0;
      transition: 0.2s;
      flex: 1;
      opacity: 0.7;
    }
    .tab-btn.active {
      background: var(--glass-hover);
      opacity: 1;
      box-shadow: inset 0 -2px 0 var(--accent);
    }
    .tab-btn:hover { opacity: 1; background: var(--glass-hover); }
    .tab-btn:disabled { opacity: 0.4; pointer-events: none; }

    .tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--accent) transparent;
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    .section-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .mode-selector { display: flex; flex-direction: column; gap: 0.75rem; }
    .radio-option {
      display: flex; align-items: center; gap: 0.5rem; cursor: pointer;
      padding: 0.6rem 1rem; border-radius: 14px; transition: 0.2s;
      background: var(--glass);
    }
    .radio-option:hover { background: var(--glass-hover); }
    .radio-option input { accent-color: var(--accent); transform: scale(1.2); }
    .radio-option input:disabled { opacity: 0.5; cursor: not-allowed; }
    .radio-option span { font-size: 0.95rem; }

    .tooltip {
      position: relative;
      width: 20px; height: 20px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: bold; cursor: help;
      margin-left: auto; color: #fff;
      border: 1px solid var(--border);
      transition: 0.15s;
      z-index: 10;
    }
    .tooltip:hover { background: rgba(255,255,255,0.35); }
    .tooltip::after {
      content: attr(data-tip);
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      transform: translateX(0);
      background: var(--tooltip-bg);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 12px;
      white-space: normal;
      max-width: 200px;
      width: max-content;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      border: 1px solid var(--border);
      z-index: 1000;
      color: var(--text);
      box-shadow: 0 5px 15px rgba(0,0,0,0.5);
      font-weight: 400;
      word-break: break-word;
    }
    .tooltip:hover::after { opacity: 1; }

    .timer-settings {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--glass);
      padding: 0.8rem 1rem;
      border-radius: 16px;
    }
    .timer-settings label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.9rem;
      white-space: nowrap;
    }
    .timer-settings input {
      width: 70px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem;
      border-radius: 10px;
      text-align: center;
    }
    .timer-settings input:disabled { opacity: 0.5; cursor: not-allowed; }
    .timer-settings select {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem;
      border-radius: 10px;
    }
    .timer-settings select:disabled { opacity: 0.5; cursor: not-allowed; }

    .segments-list { display: flex; flex-direction: column; gap: 0.6rem; max-height: 280px; overflow-y: auto; }
    .segment-item {
      display: grid; grid-template-columns: 1fr 65px 32px; gap: 0.5rem; align-items: center;
      background: var(--glass); padding: 0.4rem 0.8rem; border-radius: 14px;
    }
    .seg-input {
      background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: var(--text);
      padding: 0.5rem; border-radius: 8px; font-size: 0.9rem; width: 100%;
    }
    .seg-input:disabled { opacity: 0.5; cursor: not-allowed; }
    .seg-del {
      background: none; border: none; color: var(--danger); cursor: pointer;
      font-size: 1.5rem; padding: 0; border-radius: 8px;
    }
    .seg-del:disabled { opacity: 0.3; cursor: not-allowed; }
    .seg-del:hover:not(:disabled) { background: rgba(239,68,68,0.2); }

    .btn {
      padding: 0.8rem 1rem; border-radius: 14px; border: none; font-weight: 600;
      cursor: pointer; transition: 0.2s; font-size: 0.95rem;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.15); transform: translateY(-2px); }
    .btn-secondary {
      background: var(--glass);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--glass-hover); }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--glass);
      padding: 0.7rem 1rem;
      border-radius: 14px;
    }
    .setting-row label { font-size: 0.95rem; display: flex; align-items: center; gap: 0.5rem; }

    select, input[type="text"] {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.5rem 0.8rem;
      border-radius: 10px;
    }
    select:disabled, input[type="text"]:disabled { opacity: 0.5; cursor: not-allowed; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.8rem;
    }
    .stat-card {
      background: var(--glass);
      padding: 1rem;
      border-radius: 16px;
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .stat-label { font-size: 0.8rem; opacity: 0.8; margin-top: 0.25rem; }

    .history-list {
      max-height: 200px;
      overflow-y: auto;
      font-size: 0.9rem;
      border-radius: 12px;
      background: var(--glass);
      padding: 0.3rem 0;
    }
    .history-item {
      padding: 0.5rem 0.8rem;
      border-bottom: 1px solid var(--border);
    }
    .history-item:last-child { border-bottom: none; }

    .main-area {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wheel-wrapper {
      position: relative; width: min(80vw, 80vh, 700px); aspect-ratio: 1;
    }
    canvas {
      width: 100%; height: 100%; border-radius: 50%;
      box-shadow: 0 0 60px var(--accent), inset 0 0 30px rgba(0,0,0,0.5);
      transition: box-shadow 0.3s;
    }
    .pointer {
      position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0; border-left: 22px solid transparent;
      border-right: 22px solid transparent; border-top: 34px solid #fff;
      filter: drop-shadow(0 6px 12px rgba(0,0,0,0.6)); z-index: 10;
    }

    .spin-btn {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: 4px solid rgba(255,255,255,0.4); color: #fff; font-weight: 900;
      font-size: 1.4rem; letter-spacing: 2px; cursor: pointer;
      transition: all 0.3s ease; z-index: 10;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }
    .spin-btn:hover:not(:disabled) { transform: translate(-50%, -50%) scale(1.05); }
    .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .result-popup {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
      background: var(--popup-bg); backdrop-filter: blur(24px);
      border: 2px solid var(--accent); border-radius: 32px;
      padding: 2rem 3rem; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
      z-index: 1000; opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      text-align: center; color: var(--text);
    }
    .result-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    .result-popup .emoji { font-size: 4rem; margin-bottom: 0.5rem; }
    .result-popup .title { font-size: 1.8rem; font-weight: 800; }
    .result-popup .value { font-size: 3rem; font-weight: 900; }

    @media (max-width: 768px) {
      .app-container { grid-template-columns: 1fr; grid-template-rows: auto 1fr; padding: 1rem; gap: 1rem; }
      .sidebar { max-height: 50vh; }
      .wheel-wrapper { width: min(90vw, 70vh); }
      .spin-btn { width: 80px; height: 80px; font-size: 1.2rem; }
      .tooltip::after {
        max-width: 160px;
        left: 50%;
        transform: translateX(-50%);
        white-space: normal;
      }
    }
  </style>
</head>
<body>
<div class="app-container">
  <aside class="sidebar">
    <div class="tabs-header">
      <button class="tab-btn active" data-tab="settings" data-i18n="settingsTab">⚙️ Settings</button>
      <button class="tab-btn" data-tab="presets" data-i18n="presetsTab">💾 Presets</button>
      <button class="tab-btn" data-tab="stats" data-i18n="statsTab">📊 Statistics</button>
    </div>
    <div class="tab-content">
      <!-- Вкладка Настройки -->
      <div class="tab-pane active" id="tab-settings">
        <div class="section-title" data-i18n="modeTitle">Режим</div>
        <div class="mode-selector">
          <label class="radio-option">
            <input type="radio" name="mode" value="classic" checked> <span data-i18n="modeClassic">Классический</span>
            <span class="tooltip" data-tip-key="classicTip">?</span>
          </label>
          <label class="radio-option">
            <input type="radio" name="mode" value="decreasing"> <span data-i18n="modeDecreasing">На убывание</span>
            <span class="tooltip" data-tip-key="decreasingTip">?</span>
          </label>
        </div>

        <div class="section-title" data-i18n="durationTitle">Длительность</div>
        <div class="timer-settings">
          <label data-i18n="durationLabel">⏱️ Длительность:</label>
          <input type="number" id="durationInput" min="0.5" max="60" step="0.5" value="4.0">
          <select id="durationUnit">
            <option value="sec" data-i18n="secUnit" selected>сек.</option>
            <option value="min" data-i18n="minUnit">мин.</option>
          </select>
        </div>

        <div class="section-title" data-i18n="segmentsTitle">Сектора</div>
        <div class="segments-list" id="segmentsList"></div>
        <div class="total-warning" id="totalWarning"></div>
        <button id="addSegmentBtn" class="btn btn-primary" data-i18n="addSegmentBtn">+ Добавить ячейку</button>

        <div class="section-title" data-i18n="appearanceTitle">Оформление</div>
        <div class="setting-row">
          <label data-i18n="themeLabel">🎨 Тема</label>
          <select id="themeSelect">
            <option value="dark" data-i18n="themeDark">Тёмная</option>
            <option value="light" data-i18n="themeLight">Светлая</option>
            <option value="neon" data-i18n="themeNeon">Неоновая</option>
            <option value="festive" data-i18n="themeFestive">Праздничная</option>
          </select>
        </div>
        <div class="setting-row">
          <label data-i18n="animationLabel">🌀 Анимация</label>
          <select id="animationType">
            <option value="easeOut" data-i18n="animSmooth">Плавно</option>
            <option value="linear" data-i18n="animSharp">Резко</option>
            <option value="easeIn" data-i18n="animAccel">С ускорением</option>
          </select>
        </div>

        <div class="section-title" data-i18n="soundTitle">Звук</div>
        <div class="setting-row">
          <label data-i18n="soundLabel">🔊 Включить</label>
          <input type="checkbox" id="soundToggle" checked>
        </div>

        <div class="section-title" data-i18n="langTitle">Язык</div>
        <div class="setting-row">
          <label data-i18n="langLabel">🌐</label>
          <select id="langSelect">
            <option value="ru" data-i18n="langRu">Русский</option>
            <option value="en" data-i18n="langEn">English</option>
          </select>
        </div>
      </div>

      <!-- Вкладка Пресеты -->
      <div class="tab-pane" id="tab-presets">
        <div class="section-title" data-i18n="savedPresetsTitle">Сохранённые наборы</div>
        <div id="presetsList" style="display:flex; flex-direction:column; gap:0.5rem;"></div>
        <button class="btn btn-secondary" id="savePresetBtn" data-i18n="savePreset">💾 Сохранить текущий</button>
        <button class="btn btn-secondary" id="exportPresetBtn" data-i18n="exportPreset">📤 Экспорт</button>
        <input type="file" id="importPresetInput" accept=".json" style="display:none;">
        <button class="btn btn-secondary" id="importPresetBtn" data-i18n="importPreset">📥 Импорт</button>
      </div>

      <!-- Вкладка Статистика -->
      <div class="tab-pane" id="tab-stats">
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-value" id="totalSpins">0</div><div class="stat-label" data-i18n="totalSpinsLabel">Вращений</div></div>
          <div class="stat-card"><div class="stat-value" id="favResult">—</div><div class="stat-label" data-i18n="favResultLabel">Частый результат</div></div>
        </div>
        <div class="section-title" data-i18n="historyTitle">История</div>
        <div class="history-list" id="historyList"></div>
        <button class="btn btn-secondary" id="clearStatsBtn" data-i18n="clearStats">🗑️ Очистить</button>
      </div>
    </div>
  </aside>

  <main class="main-area">
    <div class="wheel-wrapper">
      <div class="pointer"></div>
      <canvas id="wheelCanvas"></canvas>
      <button id="spinBtn" class="spin-btn" data-i18n="spinBtn">SPIN</button>
    </div>
  </main>
</div>

<div class="result-popup" id="resultPopup">
  <div class="emoji" id="popupEmoji">🎉</div>
  <div class="title" id="popupTitle" data-i18n="popupTitle">Выпало</div>
  <div class="value" id="popupValue">—</div>
  <div class="chance" id="popupChance"></div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- ПЕРЕВОДЫ (полные) ----------
    const translations = {
      ru: {
        settingsTab: '⚙️ Настройки', presetsTab: '💾 Пресеты', statsTab: '📊 Статистика',
        modeTitle: 'Режим', durationTitle: 'Длительность', segmentsTitle: 'Сектора',
        appearanceTitle: 'Оформление', soundTitle: 'Звук', langTitle: 'Язык',
        modeClassic: 'Классический', modeDecreasing: 'На убывание',
        classicTip: 'Стандартный режим: один прокрут — один результат',
        decreasingTip: 'Выпавший вариант исчезает. Когда останется один — он побеждает',
        durationLabel: '⏱️ Длительность:', secUnit: 'сек.', minUnit: 'мин.',
        addSegmentBtn: '+ Добавить ячейку',
        themeLabel: '🎨 Тема', themeDark: 'Тёмная', themeLight: 'Светлая', themeNeon: 'Неоновая', themeFestive: 'Праздничная',
        animationLabel: '🌀 Анимация', animSmooth: 'Плавно', animSharp: 'Резко', animAccel: 'С ускорением',
        soundLabel: '🔊 Включить',
        langLabel: '🌐 Язык', langRu: 'Русский', langEn: 'English',
        spinBtn: 'SPIN',
        popupTitle: 'Выпало', popupTitleWin: 'ПОБЕДИЛ',
        warningSum: '⚠️ Сумма: ', warningNot100: ' ≠ 100%', chanceText: 'Шанс: ',
        savePreset: '💾 Сохранить текущий', exportPreset: '📤 Экспорт', importPreset: '📥 Импорт',
        clearStats: '🗑️ Очистить', historyTitle: 'История', totalSpinsLabel: 'Вращений', favResultLabel: 'Частый результат',
        savedPresetsTitle: 'Сохранённые наборы', noPresets: 'Нет сохранённых пресетов'
      },
      en: {
        settingsTab: '⚙️ Settings', presetsTab: '💾 Presets', statsTab: '📊 Statistics',
        modeTitle: 'Mode', durationTitle: 'Duration', segmentsTitle: 'Segments',
        appearanceTitle: 'Appearance', soundTitle: 'Sound', langTitle: 'Language',
        modeClassic: 'Classic', modeDecreasing: 'Decreasing',
        classicTip: 'Standard mode: one spin — one result',
        decreasingTip: 'The selected option disappears. When one remains, it wins.',
        durationLabel: '⏱️ Duration:', secUnit: 'sec', minUnit: 'min',
        addSegmentBtn: '+ Add segment',
        themeLabel: '🎨 Theme', themeDark: 'Dark', themeLight: 'Light', themeNeon: 'Neon', themeFestive: 'Festive',
        animationLabel: '🌀 Animation', animSmooth: 'Smooth', animSharp: 'Sharp', animAccel: 'Accelerated',
        soundLabel: '🔊 Enable',
        langLabel: '🌐 Language', langRu: 'Russian', langEn: 'English',
        spinBtn: 'SPIN',
        popupTitle: 'Result', popupTitleWin: 'WINNER',
        warningSum: '⚠️ Sum: ', warningNot100: ' ≠ 100%', chanceText: 'Chance: ',
        savePreset: '💾 Save current', exportPreset: '📤 Export', importPreset: '📥 Import',
        clearStats: '🗑️ Clear', historyTitle: 'History', totalSpinsLabel: 'Spins', favResultLabel: 'Favorite',
        savedPresetsTitle: 'Saved presets', noPresets: 'No saved presets'
      }
    };

    let currentLang = 'ru';
    function t(key) { return translations[currentLang][key] || key; }

    function applyLanguage(lang) {
      currentLang = lang;
      // Обновляем все элементы с data-i18n
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (key) el.textContent = t(key);
      });
      // Специальные элементы: tooltip подсказки
      document.querySelector('[data-tip-key="classicTip"]').setAttribute('data-tip', t('classicTip'));
      document.querySelector('[data-tip-key="decreasingTip"]').setAttribute('data-tip', t('decreasingTip'));
      // Обновляем динамические списки (пресеты и история, чтобы перевести "Нет пресетов")
      if (document.getElementById('tab-presets').classList.contains('active')) loadPresetsList();
      // Обновляем предупреждение о сумме
      updateWarning();
      // Обновляем текст в попапе (заголовок может быть уже переведён через data-i18n, но на всякий случай)
      document.getElementById('popupTitle').textContent = t('popupTitle');
      // Обновляем кнопку SPIN (если не сработало)
      spinBtn.textContent = t('spinBtn');
    }

    // ---------- ПАЛИТРА И СЕГМЕНТЫ ----------
    const PALETTE_BASE = ['#FF007A', '#8A2BE2', '#00D4FF', '#00FF87', '#FFB800', '#FF4500', '#6A0DAD', '#00BFFF', '#32CD32', '#FF1493', '#E0115F', '#7FFF00'];
    let palette = [...PALETTE_BASE];
    let segments = [
      { id: 1, name: '1', probability: 20, color: palette[0] },
      { id: 2, name: '2', probability: 20, color: palette[1] },
      { id: 3, name: '3', probability: 20, color: palette[2] },
      { id: 4, name: '4', probability: 20, color: palette[3] },
      { id: 5, name: '5', probability: 20, color: palette[4] }
    ];
    let currentRotation = 0;
    let isSpinning = false;
    let mode = 'classic';
    let nextId = 6;

    let animFrame = null, animStartTime = 0, animDuration = 4000;
    let animStartRot = 0, animTargetRot = 0, animDiff = 0;

    // Статистика
    let stats = { totalSpins: 0, results: {}, history: [] };
    function loadStats() {
      const saved = localStorage.getItem('wheel_stats');
      if (saved) try { stats = JSON.parse(saved); } catch(e) { stats = { totalSpins: 0, results: {}, history: [] }; }
      updateStatsDisplay();
    }
    function saveStats() { localStorage.setItem('wheel_stats', JSON.stringify(stats)); }
    function addSpinResult(result) {
      stats.totalSpins++;
      stats.results[result] = (stats.results[result] || 0) + 1;
      stats.history.unshift({ result, time: new Date().toLocaleTimeString() });
      if (stats.history.length > 20) stats.history.pop();
      saveStats();
      updateStatsDisplay();
    }
    function updateStatsDisplay() {
      document.getElementById('totalSpins').textContent = stats.totalSpins || 0;
      let fav = '—', max = 0;
      if (stats.results) {
        Object.entries(stats.results).forEach(([k,v]) => { if(v > max) { max = v; fav = k; } });
      }
      document.getElementById('favResult').textContent = fav;
      const histDiv = document.getElementById('historyList');
      histDiv.innerHTML = (stats.history || []).map(h => `<div class="history-item">${h.result} — ${h.time}</div>`).join('');
    }

    // ---------- DOM ----------
    const canvas = document.getElementById('wheelCanvas');
    const ctx = canvas.getContext('2d');
    const spinBtn = document.getElementById('spinBtn');
    const addBtn = document.getElementById('addSegmentBtn');
    const listContainer = document.getElementById('segmentsList');
    const warningEl = document.getElementById('totalWarning');
    const durationInput = document.getElementById('durationInput');
    const durationUnit = document.getElementById('durationUnit');
    const soundToggle = document.getElementById('soundToggle');
    const themeSelect = document.getElementById('themeSelect');
    const animationType = document.getElementById('animationType');
    const langSelect = document.getElementById('langSelect');
    const popup = document.getElementById('resultPopup');
    const popupEmoji = document.getElementById('popupEmoji');
    const popupTitle = document.getElementById('popupTitle');
    const popupValue = document.getElementById('popupValue');
    const popupChance = document.getElementById('popupChance');

    // Вкладки
    const tabs = document.querySelectorAll('.tab-btn');
    const panes = document.querySelectorAll('.tab-pane');
    tabs.forEach(btn => {
      btn.addEventListener('click', () => {
        if (isSpinning) return;
        const tabId = btn.dataset.tab;
        tabs.forEach(b => b.classList.remove('active'));
        panes.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`tab-${tabId}`).classList.add('active');
        if (tabId === 'presets') loadPresetsList();
        if (tabId === 'stats') updateStatsDisplay();
      });
    });

    // Пресеты
    function loadPresetsList() {
      const presets = JSON.parse(localStorage.getItem('wheel_presets') || '[]');
      const container = document.getElementById('presetsList');
      container.innerHTML = '';
      if (!presets.length) {
        container.innerHTML = `<div style="opacity:0.7; padding:0.5rem;">${t('noPresets')}</div>`;
        return;
      }
      presets.forEach((p, i) => {
        const div = document.createElement('div');
        div.style.display = 'flex'; div.style.gap = '0.5rem'; div.style.alignItems = 'center';
        div.innerHTML = `<span style="flex:1">${p.name || 'Preset '+(i+1)}</span>
          <button class="load-preset" data-index="${i}" style="background:none;border:none;color:var(--text);cursor:pointer;">📂</button>
          <button class="delete-preset" data-index="${i}" style="background:none;border:none;color:var(--danger);cursor:pointer;">❌</button>`;
        container.appendChild(div);
      });
      document.querySelectorAll('.load-preset').forEach(b => b.addEventListener('click', e => {
        if (isSpinning) return;
        const idx = e.target.dataset.index;
        const presets = JSON.parse(localStorage.getItem('wheel_presets') || '[]');
        if (presets[idx]) {
          segments = presets[idx].segments.map(s => ({...s}));
          nextId = Math.max(...segments.map(s => s.id), 0) + 1;
          mode = presets[idx].mode;
          document.querySelector(`input[name="mode"][value="${mode}"]`).checked = true;
          renderList();
          updateWarning();
          drawWheel();
        }
      }));
      document.querySelectorAll('.delete-preset').forEach(b => b.addEventListener('click', e => {
        if (isSpinning) return;
        const idx = e.target.dataset.index;
        const presets = JSON.parse(localStorage.getItem('wheel_presets') || '[]');
        presets.splice(idx, 1);
        localStorage.setItem('wheel_presets', JSON.stringify(presets));
        loadPresetsList();
      }));
    }

    document.getElementById('savePresetBtn').addEventListener('click', () => {
      if (isSpinning) return;
      const name = prompt(t('savePresetPrompt') || 'Preset name:');
      if (!name) return;
      const presets = JSON.parse(localStorage.getItem('wheel_presets') || '[]');
      presets.push({ name, segments: segments.map(s => ({...s})), mode });
      localStorage.setItem('wheel_presets', JSON.stringify(presets));
      loadPresetsList();
    });

    document.getElementById('exportPresetBtn').addEventListener('click', () => {
      if (isSpinning) return;
      const data = { segments: segments.map(s => ({...s})), mode };
      const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'wheel_preset.json';
      a.click();
    });

    document.getElementById('importPresetBtn').addEventListener('click', () => {
      if (isSpinning) return;
      document.getElementById('importPresetInput').click();
    });

    document.getElementById('importPresetInput').addEventListener('change', e => {
      if (isSpinning) return;
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          if (data.segments && Array.isArray(data.segments)) {
            segments = data.segments.map(s => ({...s}));
            nextId = Math.max(...segments.map(s => s.id), 0) + 1;
          }
          if (data.mode) {
            mode = data.mode;
            document.querySelector(`input[name="mode"][value="${mode}"]`).checked = true;
          }
          renderList();
          updateWarning();
          drawWheel();
        } catch(ex) {
          alert('Import error: invalid file format');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    document.getElementById('clearStatsBtn').addEventListener('click', () => {
      if (isSpinning) return;
      stats = { totalSpins: 0, results: {}, history: [] };
      saveStats();
      updateStatsDisplay();
    });

    // ========== ЗВУКИ (барабан всегда, 1995 с шансом 5%) ==========
    let audioCtx = null;
    let currentSpinAudio = null;

    function initAudio() {
      if (audioCtx) return;
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }

    async function resumeAudio() {
      if (!audioCtx) initAudio();
      if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
    }

    function playSpinSound() {
      if (!soundToggle.checked) return;
      if (currentSpinAudio && !currentSpinAudio.paused) {
        currentSpinAudio.pause();
        currentSpinAudio.currentTime = 0;
      }
      const useRare = Math.random() < 0.05; // 5% шанс на редкий звук
      const file = useRare ? 'барабан 1995.mp3' : 'барабан.mp3';
      currentSpinAudio = new Audio(file);
      currentSpinAudio.loop = true;
      currentSpinAudio.volume = 0.4;
      currentSpinAudio.play().catch(e => console.log("Spin sound error:", e));
    }

    function stopSpinSound() {
      if (currentSpinAudio) {
        currentSpinAudio.pause();
        currentSpinAudio.currentTime = 0;
        currentSpinAudio = null;
      }
    }

    function playWinSound() {
      if (!soundToggle.checked) return;
      if (!audioCtx) initAudio();
      if (!audioCtx) return;
      resumeAudio().then(() => {
        const now = audioCtx.currentTime;
        const gain = audioCtx.createGain();
        gain.gain.value = 0.3;
        gain.connect(audioCtx.destination);
        const notes = [523.25, 659.25];
        const durations = [0.15, 0.2];
        let timeOffset = 0;
        notes.forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          osc.type = 'sine';
          osc.frequency.value = freq;
          const gn = audioCtx.createGain();
          gn.gain.setValueAtTime(0, now + timeOffset);
          gn.gain.linearRampToValueAtTime(0.2, now + timeOffset + 0.05);
          gn.gain.exponentialRampToValueAtTime(0.001, now + timeOffset + durations[i]);
          osc.connect(gn);
          gn.connect(gain);
          osc.start(now + timeOffset);
          osc.stop(now + timeOffset + durations[i]);
          timeOffset += durations[i];
        });
      }).catch(e => console.log("Win sound error:", e));
    }
    // =========================================

    function getSpinDurationMs() {
      let val = parseFloat(durationInput.value);
      if (isNaN(val) || val < 0.5) val = 4.0;
      return durationUnit.value === 'min' ? val * 60000 : val * 1000;
    }

    // ---------- РИСОВАНИЕ ----------
    function drawWheel() {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      if (w === 0 || h === 0) return;
      canvas.width = w * devicePixelRatio;
      canvas.height = h * devicePixelRatio;
      ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
      const cx = w/2, cy = h/2, r = Math.min(cx, cy) - 6;
      ctx.clearRect(0, 0, w, h);
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(currentRotation);
      let start = -Math.PI/2;
      const totalProb = segments.reduce((sum, seg) => sum + seg.probability, 0) || 1;
      segments.forEach(seg => {
        const angle = (seg.probability / totalProb) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, r, start, start + angle);
        ctx.closePath();
        ctx.fillStyle = seg.color;
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.save();
        const mid = start + angle/2;
        ctx.translate(Math.cos(mid) * r * 0.65, Math.sin(mid) * r * 0.65);
        ctx.rotate(mid + Math.PI/2);
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${Math.min(18, r * 0.09)}px system-ui`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#000';
        ctx.shadowBlur = 6;
        let displayName = seg.name;
        if (displayName.length > 10) displayName = displayName.substring(0, 9) + '…';
        ctx.fillText(displayName, 0, 0);
        ctx.restore();
        start += angle;
      });
      ctx.restore();
    }

    function getWinnerAtPointer() {
      const total = segments.reduce((sum, seg) => sum + seg.probability, 0);
      let pointerAngle = -Math.PI / 2 - currentRotation;
      pointerAngle = ((pointerAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);
      let start = 0;
      for (let seg of segments) {
        const sliceAngle = (seg.probability / total) * 2 * Math.PI;
        let segStart = ((-Math.PI/2 + start) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI);
        let segEnd = (segStart + sliceAngle) % (2*Math.PI);
        if (segEnd < segStart) {
          if (pointerAngle >= segStart || pointerAngle < segEnd) return seg;
        } else {
          if (pointerAngle >= segStart && pointerAngle < segEnd) return seg;
        }
        start += sliceAngle;
      }
      return segments[0];
    }

    function showPopup(winnerName, chance, isFinal = false) {
      if (popup.hideTimer) clearTimeout(popup.hideTimer);
      popupEmoji.textContent = isFinal ? '🏆' : '🎉';
      popupTitle.textContent = isFinal ? t('popupTitleWin') : t('popupTitle');
      popupValue.textContent = winnerName;
      popupChance.textContent = `${t('chanceText')} ${chance.toFixed(1)}%`;
      popup.classList.add('show');
      popup.hideTimer = setTimeout(() => { 
        if (!isSpinning) popup.classList.remove('show'); 
      }, 3500);
    }

    function hidePopup() { 
      popup.classList.remove('show'); 
      if (popup.hideTimer) clearTimeout(popup.hideTimer);
    }

    function getEase(t, type) {
      if (type === 'linear') return t;
      if (type === 'easeIn') return t * t;
      return 1 - Math.pow(1 - t, 3);
    }

    function setSettingsEnabled(enabled) {
      const inputs = document.querySelectorAll('.sidebar input, .sidebar select, .sidebar button, .tab-btn');
      inputs.forEach(el => { if (el.id !== 'spinBtn') el.disabled = !enabled; });
    }

    function animationLoop(now) {
      const elapsed = now - animStartTime;
      const t = Math.min(elapsed / animDuration, 1);
      const ease = getEase(t, animationType.value);
      currentRotation = animStartRot + animDiff * ease;
      drawWheel();

      if (t < 1) {
        animFrame = requestAnimationFrame(animationLoop);
      } else {
        isSpinning = false;
        spinBtn.disabled = false;
        setSettingsEnabled(true);
        stopSpinSound();

        const winner = getWinnerAtPointer();
        const total = segments.reduce((sum, seg) => sum + seg.probability, 0);
        const chance = (winner.probability / total) * 100;
        addSpinResult(winner.name);

        if (mode === 'classic') {
          playWinSound();
          showPopup(winner.name, chance, false);
        } else {
          if (segments.length > 1) {
            segments = segments.filter(s => s.id !== winner.id);
            const newTotal = segments.reduce((sum, seg) => sum + seg.probability, 0);
            segments.forEach(s => s.probability = parseFloat(((s.probability / newTotal) * 100).toFixed(2)));
            renderList();
            updateWarning();
            drawWheel();
            if (segments.length === 1) {
              playWinSound();
              showPopup(segments[0].name, 100, true);
            } else {
              playWinSound();
              showPopup(winner.name, chance, false);
            }
          } else {
            playWinSound();
            showPopup(winner.name, 100, true);
          }
        }
      }
    }

    function startSpin(targetRot) {
      if (animFrame) cancelAnimationFrame(animFrame);
      animStartTime = performance.now();
      animDuration = getSpinDurationMs();
      animStartRot = currentRotation;
      animTargetRot = targetRot;
      animDiff = animTargetRot - animStartRot;
      animFrame = requestAnimationFrame(animationLoop);
    }

    function spin() {
      if (isSpinning || segments.length === 0) return;
      hidePopup();
      const totalProb = segments.reduce((sum, seg) => sum + seg.probability, 0);
      let rand = Math.random() * totalProb;
      let cum = 0, winnerIdx = 0;
      for (let i = 0; i < segments.length; i++) {
        cum += segments[i].probability;
        if (rand <= cum) { winnerIdx = i; break; }
      }
      let startAngle = -Math.PI / 2;
      for (let i = 0; i < winnerIdx; i++) {
        startAngle += (segments[i].probability / totalProb) * 2 * Math.PI;
      }
      const slice = (segments[winnerIdx].probability / totalProb) * 2 * Math.PI;
      const targetInWheel = startAngle + slice * 0.15 + Math.random() * slice * 0.7;
      let needed = (-Math.PI / 2 - targetInWheel) % (2 * Math.PI);
      if (needed <= 0) needed += 2 * Math.PI;
      const spins = 5 + Math.floor(Math.random() * 3);
      const targetRot = currentRotation + spins * 2 * Math.PI + needed;

      isSpinning = true;
      spinBtn.disabled = true;
      setSettingsEnabled(false);
      playSpinSound();
      startSpin(targetRot);
    }

    function renderList() {
      listContainer.innerHTML = '';
      segments.forEach(seg => {
        const div = document.createElement('div');
        div.className = 'segment-item';
        div.innerHTML = `
          <input type="text" class="seg-input" value="${seg.name}" data-id="${seg.id}" data-field="name" maxlength="15">
          <input type="number" class="seg-input" value="${seg.probability}" data-id="${seg.id}" data-field="probability" min="0" max="100" step="0.1">
          <button class="seg-del" data-id="${seg.id}" ${segments.length <= 1 ? 'disabled' : ''}>×</button>
        `;
        listContainer.appendChild(div);
      });
      document.querySelectorAll('.seg-input').forEach(inp => inp.addEventListener('input', e => {
        if (isSpinning) return;
        const id = parseInt(e.target.dataset.id);
        const field = e.target.dataset.field;
        const seg = segments.find(s => s.id === id);
        if (!seg) return;
        if (field === 'name') {
          const val = e.target.value.trim();
          if (val) seg.name = val;
          else e.target.value = seg.name;
        } else {
          seg.probability = Math.max(0, parseFloat(e.target.value) || 0);
          updateWarning();
        }
        drawWheel();
      }));
      document.querySelectorAll('.seg-del').forEach(btn => btn.addEventListener('click', e => {
        if (isSpinning) return;
        const id = parseInt(e.target.dataset.id);
        if (segments.length > 1) {
          segments = segments.filter(s => s.id !== id);
          renderList();
          updateWarning();
          drawWheel();
        }
      }));
    }

    function updateWarning() {
      const sum = segments.reduce((s, seg) => s + seg.probability, 0);
      if (Math.abs(sum - 100) > 0.05) {
        warningEl.classList.add('visible');
        warningEl.textContent = `${t('warningSum')} ${sum.toFixed(1)}% ${t('warningNot100')}`;
      } else {
        warningEl.classList.remove('visible');
      }
    }

    function applyTheme(theme) {
      document.body.className = '';
      if (theme === 'light') document.body.classList.add('theme-light');
      else if (theme === 'neon') document.body.classList.add('theme-neon');
      else if (theme === 'festive') document.body.classList.add('theme-festive');
      
      if (theme === 'light') palette = ['#3b82f6','#8b5cf6','#06b6d4','#10b981','#f59e0b','#ef4444','#6366f1','#14b8a6','#d946ef','#f97316'];
      else if (theme === 'neon') palette = ['#00ffff','#ff00ff','#00ff88','#ffaa00','#ff3366','#aa44ff','#00ccff','#ff66cc','#99ff33','#ff9933'];
      else if (theme === 'festive') palette = ['#ffd700','#ff6ec7','#7fffd4','#ffa07a','#da70d6','#ff4500','#32cd32','#ff1493','#ffb347','#9370db'];
      else palette = [...PALETTE_BASE];
      
      segments.forEach((seg, i) => { seg.color = palette[i % palette.length]; });
      drawWheel();
    }

    function init() {
      loadStats();
      renderList();
      updateWarning();
      drawWheel();
      
      spinBtn.addEventListener('click', spin);
      addBtn.addEventListener('click', () => {
        if (isSpinning || segments.length >= 12) return;
        const newProb = parseFloat((100 / (segments.length + 1)).toFixed(2));
        segments.push({
          id: nextId++,
          name: String(nextId),
          probability: newProb,
          color: palette[(nextId - 2) % palette.length]
        });
        renderList();
        updateWarning();
        drawWheel();
      });
      
      document.querySelectorAll('input[name="mode"]').forEach(r => r.addEventListener('change', e => { if (!isSpinning) mode = e.target.value; }));
      themeSelect.addEventListener('change', e => { if (!isSpinning) applyTheme(e.target.value); });
      langSelect.addEventListener('change', e => { if (!isSpinning) applyLanguage(e.target.value); });
      window.addEventListener('resize', () => drawWheel());
      
      applyLanguage('ru');
      setSettingsEnabled(true);
    }
    
    init();
  })();
</script>
</body>
